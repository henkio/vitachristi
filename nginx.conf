server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # JSON with correct type + short cache (content updates)
    location ~* \.json$ {
        default_type application/json;
        add_header Cache-Control "public, max-age=300";
    }

    # hashless SPA: everything falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # static assets cache
    location ~* \.(css|js|svg|woff2?|jpg|jpeg|png|webp)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;
}
