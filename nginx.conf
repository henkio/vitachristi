server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # HTML shell + service worker: always revalidate so a deploy takes effect
    # on the next load (no 24h-stale browser cache holding old code).
    location = /index.html { add_header Cache-Control "no-cache"; }
    location = /sw.js      { add_header Cache-Control "no-cache"; }

    # JSON content: short cache (content updates)
    location ~* \.json$ {
        default_type application/json;
        add_header Cache-Control "public, max-age=300";
    }

    # App code: revalidate every load via ETag (304 when unchanged) so users
    # never sit on stale CSS/JS after a deploy.
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Truly static media: safe to cache for a day (rarely changes).
    location ~* \.(svg|woff2?|jpg|jpeg|png|webp|ico)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # hashless SPA: everything falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;
}
